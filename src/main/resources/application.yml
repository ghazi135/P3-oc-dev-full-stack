spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/chatop_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:chatop}
    password: ${DB_PASSWORD:chatop}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework: error

chatop:
  jwt:
    # Set JWT_SECRET in env or .env; default only for local dev
    secret: ${JWT_SECRET:chatop-dev-secret-change-in-production}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  upload-dir: ./uploads
  upload-base-url: http://localhost:8080